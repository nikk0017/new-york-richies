<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Elite Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ny-red: #E31837;
            --ny-black: #000000;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--ny-black);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 1. STABLE GRADIENT WALLPAPER (No image needed) */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #4a0000, #000000 80%);
        }

        /* 2. SOFT GLOW ANIMATION */
        .glow-effect {
            position: fixed;
            top: 50%; left: 50%;
            width: 300px; height: 300px;
            background: var(--ny-red);
            filter: blur(150px);
            opacity: 0.2;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            padding-top: 60px;
        }

        /* 3. LOGO BOX (Self-correcting) */
        .logo-box {
            width: 160px; height: 160px;
            background: white;
            border-radius: 50%;
            border: 4px solid var(--ny-red);
            box-shadow: 0 0 40px rgba(227, 24, 55, 0.6);
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-box img { width: 92%; height: 92%; object-fit: contain; }

        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .tag { color: var(--ny-red); font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; margin-top: 5px; }

        /* 4. PREMIUM BUTTONS */
        .btn-stack { width: 85%; margin: 40px auto; display: flex; flex-direction: column; gap: 15px; }

        .btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .btn:hover { background: var(--ny-red); transform: translateY(-3px); border-color: transparent; }

        .order-prime {
            background: var(--ny-red);
            border: none;
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.4);
        }

        /* 5. BIG SOCIALS */
        .social-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 85%; margin: 30px auto; }
        .s-box { height: 75px; background: rgba(255,255,255,0.05); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); }
        .s-box:hover { background: var(--ny-red); transform: scale(1.1); }

        .footer { width: 85%; margin: 40px auto; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 25px; text-align: left; border-bottom: 5px solid var(--ny-red); }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="glow-effect"></div>

<div class="container">
    <div class="logo-box">
        <img src="logo.jpg" alt="Richies Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3132/3132693.png'">
    </div>

    <h1>NEW YORK RICHIE'S</h1>
    <div class="tag">GARDEN CITY, IDAHO</div>

    <div class="btn-stack">
        <a href="https://newyorkrichiesboise.com" class="btn order-prime">
            <span><i class="fas fa-shopping-cart"></i> &nbsp; ORDER ONLINE NOW</span>
            <i class="fas fa-chevron-right" style="opacity:0.5"></i>
        </a>
        <a href="tel:+12083230003" class="btn">
            <span><i class="fas fa-phone-alt"></i> &nbsp; CALL TO ORDER</span>
            <i class="fas fa-chevron-right" style="opacity:0.5"></i>
        </a>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="https://www.google.com/maps/contrib/107924237845650644058/reviews5" class="btn" style="justify-content:center;">GOOGLE</a>
            <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content:center;">APPLE</a>
        </div>
    </div>

    <div class="social-row">
        <a href="https://www.instagram.com/newyorkrichiesboise" class="s-box"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1RXGRJzYYV/" class="s-box"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="s-box"><i class="fab fa-yelp"></i></a>
        <a href="https://wa.me/12083230003" class="s-box"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="footer">
        <p style="margin:0; font-weight:800; color:var(--ny-red);">📍 ADDRESS</p>
        <p style="margin:5px 0 20px;">5865 N Glenwood St, Garden City, ID 83714</p>
        <p style="margin:0; font-weight:800; color:var(--ny-red);">⏰ HOURS</p>
        <p style="margin:5px 0 0;">Tue - Sun: Open (Monday Closed)</p>
    </div>
</div>

</body>
</html>
