<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Elite Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ny-red: #E31837;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* PERMANENT WALLPAPER: Code-based Animated Gradient */
        .wallpaper-fix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            /* Yahan humne cover image ka fallback link dala hai */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('cover.webp');
            background-size: cover;
            background-position: center;
            background-color: #1a0505; /* Emergency background color */
        }

        /* EXTRAORDINARY GLOW: Isse wallpaper hamesha 'Alive' lagega */
        .glow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 20%, rgba(227, 24, 55, 0.2) 0%, transparent 80%);
            animation: pulseBg 6s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            padding-bottom: 60px;
        }

        /* COVER IMAGE SECTION (Top Design) */
        .hero-banner {
            height: 220px;
            width: 100%;
            background: url('cover.webp') center/cover no-repeat;
            border-bottom: 3px solid var(--ny-red);
            position: relative;
            margin-bottom: 80px;
        }

        .logo-box {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px; height: 140px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid var(--ny-red);
            box-shadow: 0 0 40px rgba(227, 24, 55, 0.6);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-box img { width: 90%; height: 90%; object-fit: contain; }

        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .tagline { color: var(--ny-red); font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; margin-top: 5px; }

        /* BUTTON STACK */
        .btn-stack { width: 88%; margin: 40px auto; display: flex; flex-direction: column; gap: 15px; }

        .btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 25px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(15px);
            transition: 0.3s;
        }

        .btn:hover { background: var(--ny-red); transform: translateY(-3px); border-color: transparent; }
        .order-btn { background: var(--ny-red); border: none; box-shadow: 0 10px 30px rgba(227, 24, 55, 0.5); }

        /* SOCIALS */
        .social-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 88%; margin: 20px auto; }
        .s-box { height: 75px; background: var(--glass); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); }
        .s-box:hover { background: var(--ny-red); transform: scale(1.1); }

        .footer { width: 88%; margin: 40px auto; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 25px; text-align: left; border-left: 5px solid var(--ny-red); }
    </style>
</head>
<body>

<div class="wallpaper-fix"></div>
<div class="glow-overlay"></div>

<div class="container">
    <div class="hero-banner">
        <div class="logo-box">
            <img src="logo.jpg" alt="Richie's Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3132/3132693.png'">
        </div>
    </div>

    <h1>NEW YORK RICHIE'S</h1>
    <div class="tagline">GARDEN CITY, IDAHO</div>

    <div class="btn-stack">
        <a href="https://newyorkrichiesboise.com" class="btn order-btn">
            <span><i class="fas fa-pizza-slice"></i>   ORDER ONLINE NOW</span>
            <i class="fas fa-chevron-right" style="opacity:0.6"></i>
        </a>
        
        <a href="tel:+12083230003" class="btn">
            <span><i class="fas fa-phone-alt"></i>   CALL</span>
            <i class="fas fa-chevron-right" style="opacity:0.4"></i>
        </a>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="http://googleusercontent.com/maps.google.com/17" class="btn" style="justify-content:center;">GOOGLE MAPS</a>
            <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content:center;">APPLE MAPS</a>
        </div>
    </div>

    <div class="social-row">
        <a href="https://www.instagram.com/newyorkrichiesboise" class="s-box"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1RXGRJzYYV/" class="s-box"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="s-box"><i class="fab fa-yelp"></i></a>
        <a href="https://wa.me/12083230003" class="s-box"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="footer">
        <p style="margin:0; font-weight:800; color:var(--ny-red); font-size: 0.7rem; letter-spacing: 2px;">LOCATION</p>
        <p style="margin:5px 0 20px;">5865 N Glenwood St, Garden City, ID 83714</p>
        <p style="margin:0; font-weight:800; color:var(--ny-red); font-size: 0.7rem; letter-spacing: 2px;">HOURS</p>
        <p style="margin:5px 0 0;">Tue - Sun: Open (Monday Closed)</p>
    </div>
</div>

</body>
</html>
