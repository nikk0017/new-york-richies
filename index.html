<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Richie's</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow: hidden;
}

/* 🍕 PREMIUM RESTAURANT LIVE BACKGROUND */
.bg {
    position: fixed;
    width: 140%;
    height: 140%;
    top: -20%;
    left: -20%;
    z-index: -3;

    background:
        radial-gradient(circle at 20% 30%, #ff3c00 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, #ff9a00 0%, transparent 40%),
        radial-gradient(circle at 60% 20%, #ff0055 0%, transparent 35%),
        radial-gradient(circle at 30% 80%, #ff6a00 0%, transparent 40%),
        #1a0d05;

    animation: flow 25s ease-in-out infinite alternate;
}

@keyframes flow {
    0% { transform: translate(0px, 0px) scale(1); }
    50% { transform: translate(-40px, 30px) scale(1.05); }
    100% { transform: translate(30px, -40px) scale(1.1); }
}

/* CARD */
.card {
    width: 90%;
    max-width: 420px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    text-align: center;
}

/* LOGO */
.logo {
    width: 100px;
    border-radius: 50%;
    background: white;
    margin-top: -60px;
}

/* TEXT */
h1 { margin: 10px 0; }
.tagline { font-size: 13px; opacity: 0.9; }

/* GRID */
.icons {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.item { text-align: center; }

/* BUTTON */
.icon-btn {
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.25);
    transition: 0.3s;
}

.icon-btn img { width: 30px; }

.icon-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* LABEL */
.label {
    margin-top: 6px;
    font-size: 12px;
}

/* CALL BUTTON (ONLY HERE) */
.call {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}
.call a {
    padding: 12px 28px;
    border-radius: 30px;
    background: #ff0000;
    color: white;
    text-decoration: none;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<img src="logo.jpg" class="logo">

<h1>New York Richie's</h1>
<p class="tagline">Pizza • Burgers • Sandwiches</p>

<div class="icons">

<!-- GOOGLE MAP -->
<div class="item">
<a href="https://www.google.com/maps/search/?api=1&query=5865+N+Glenwood+St+Garden+City+ID+83714" class="icon-btn">
<img src="https://img.icons8.com/color/48/google-maps.png"/>
</a>
<div class="label">Google Map</div>
</div>

<!-- INSTAGRAM -->
<div class="item">
<a href="https://www.instagram.com/newyorkrichiesboise" class="icon-btn">
<img src="https://img.icons8.com/color/48/instagram-new.png"/>
</a>
<div class="label">Instagram</div>
</div>

<!-- FACEBOOK -->
<div class="item">
<a href="https://www.facebook.com/share/1RXGRJzYYV" class="icon-btn">
<img src="https://img.icons8.com/color/48/facebook-new.png"/>
</a>
<div class="label">Facebook</div>
</div>

<!-- GOOGLE REVIEW -->
<div class="item">
<a href="https://g.page/r/CUYItzqeGzFnEBM/review" class="icon-btn">
<img src="https://img.icons8.com/color/48/google-logo.png"/>
</a>
<div class="label">Give Review</div>
</div>

<!-- WEBSITE -->
<div class="item">
<a href="https://newyorkrichiesboise.com" class="icon-btn">
<img src="https://img.icons8.com/color/48/domain.png"/>
</a>
<div class="label">Order Online</div>
</div>

<!-- YELP -->
<div class="item">
<a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="icon-btn">
<img src="https://img.icons8.com/color/48/yelp.png"/>
</a>
<div class="label">Yelp</div>
</div>

</div>

</div>

<!-- CALL BUTTON -->
<div class="call">
<a href="tel:+12083230003">📞 Call Now</a>
</div>

</body>
</html>
