<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Digital Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ny-red: #A62C2B; --ny-black: #121212; --ny-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ny-black); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--ny-white); min-height: 100vh; padding-bottom: 40px; }
        .hero { height: 240px; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('https://i.ibb.co/L5fX0gZ/2024-11-28.webp'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: flex-end; position: relative; }
        .logo { width: 120px; height: 120px; background: white; border-radius: 50%; border: 4px solid var(--ny-red); position: absolute; bottom: -60px; padding: 5px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        .content { margin-top: 80px; text-align: center; padding: 0 25px; }
        h1 { font-size: 1.8rem; margin: 0; color: var(--ny-black); font-weight: 900; }
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; background: #f8f9fa; border-radius: 18px; text-decoration: none; color: #121212; font-weight: 700; border: 1px solid #eee; }
        .prime { background: var(--ny-red); color: white; border: none; }
        .socials { margin-top: 30px; display: flex; justify-content: center; gap: 20px; font-size: 1.5rem; }
        .footer { margin: 20px; background: #f8f8f8; padding: 20px; border-radius: 20px; text-align: left; font-size: 0.9rem; border-left: 6px solid var(--ny-red); line-height: 1.5; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero"><div class="logo"><img src="https://i.ibb.co/VpL9S8S/IMG-1895.jpg"></div></div>
    <div class="content">
        <h1>NEW YORK RICHIE'S</h1>
        <p style="color: #666;">Authentic NY Pizza & Sandwiches</p>
        <div class="btn-stack">
            <a href="https://newyorkrichiesboise.com" class="btn prime"><span><i class="fas fa-pizza-slice"></i> &nbsp; Order Online Now</span><i class="fas fa-chevron-right"></i></a>
            <a href="tel:+12083230003" class="btn"><span><i class="fas fa-phone"></i> &nbsp; Call: (208) 323-0003</span><i class="fas fa-chevron-right"></i></a>
            <a href="https://g.page/r/CUYItzqeGzFnEBM/review" class="btn"><span><i class="fas fa-star"></i> &nbsp; Rate Us on Google</span><i class="fas fa-chevron-right"></i></a>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="https://www.google.com/maps/contrib/107924237845650644058/reviews" class="btn" style="justify-content: center;">Google Maps</a>
                <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content: center;">Apple Maps</a>
            </div>
        </div>
        <div class="socials">
            <a href="https://www.instagram.com/newyorkrichiesboise" style="color: #121212;"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1RXGRJzYYV/" style="color: #121212;"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.yelp.com/biz/new-york-richies-garden-city" style="color: #121212;"><i class="fab fa-yelp"></i></a>
        </div>
    </div>
    <div class="footer">
        <strong>📍 Garden City Location:</strong><br>5865 N Glenwood St, Garden City, ID 83714<br><br>
        <strong>⏰ Hours:</strong><br>Tue-Thu: 11AM–9PM | Fri-Sat: 11AM–10PM<br>Sun: 12PM–8PM (Monday: Closed)
    </div>
</div>
</body>
</html>
