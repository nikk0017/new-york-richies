<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ny-red: #E31837;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* LIVE ANIMATED BACKGROUND - Isse premium vibe aayegi */
        .animated-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(125deg, #000000, #1a0505, #000000, #2c0707);
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING PARTICLES - Chote sitare upar jayenge */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(227, 24, 55, 0.1) 0%, transparent 80%);
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            animation: floatUp 20s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* GLOWING LOGO - Jaisa aapne screenshot mein bheja */
        .logo-box {
            width: 160px; height: 160px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid var(--ny-red);
            box-shadow: 0 0 50px rgba(227, 24, 55, 0.7);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            margin-bottom: 25px;
            z-index: 5;
        }

        .logo-box img { width: 90%; height: 90%; object-fit: contain; }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin: 0; text-transform: uppercase; }
        .loc-tag { color: var(--ny-red); font-weight: 800; letter-spacing: 3px; font-size: 0.75rem; margin-top: 5px; }

        /* ELITE DASHBOARD BUTTONS */
        .btn-stack { width: 85%; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; }

        .btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 25px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(20px); /* Apple style blur */
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover { background: rgba(227, 24, 55, 0.2); transform: scale(1.03); border-color: var(--ny-red); }

        .btn-order { background: var(--ny-red); border: none; box-shadow: 0 10px 30px rgba(227, 24, 55, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* BIG SOCIAL DASHBOARD */
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 85%; margin-top: 35px; }
        .s-item { height: 75px; background: var(--glass); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; text-decoration: none; transition: 0.4s; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .s-item:hover { transform: translateY(-8px); background: var(--ny-red); }

        .footer-card { margin-top: 50px; width: 85%; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 25px; border-bottom: 6px solid var(--ny-red); text-align: left; }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="particles"></div>

<div class="container">
    <div class="logo-box">
        <img src="logo.jpg" alt="Richies Logo">
    </div>

    <h1>NEW YORK RICHIE'S</h1>
    <div class="loc-tag">GARDEN CITY, IDAHO</div>

    <div class="btn-stack">
        <a href="https://newyorkrichiesboise.com" class="btn btn-order">
            <span><i class="fas fa-pizza-slice"></i> &nbsp; ORDER ONLINE NOW</span>
            <i class="fas fa-chevron-right" style="opacity:0.5; font-size: 0.8rem;"></i>
        </a>
        
        <a href="tel:+12083230003" class="btn">
            <span><i class="fas fa-phone-alt" style="color:var(--ny-red);"></i> &nbsp; CALL: (208) 323-0003</span>
            <i class="fas fa-chevron-right" style="opacity:0.3; font-size: 0.8rem;"></i>
        </a>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="https://www.google.com/maps/contrib/107924237845650644058/reviews4" class="btn" style="justify-content:center; padding: 15px;">GOOGLE</a>
            <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content:center; padding: 15px;">APPLE</a>
        </div>
    </div>

    <div class="social-grid">
        <a href="https://www.instagram.com/newyorkrichiesboise" class="s-item"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1RXGRJzYYV/" class="s-item"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="s-item"><i class="fab fa-yelp"></i></a>
        <a href="https://wa.me/12083230003" class="s-item"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="footer-card">
        <p style="margin:0; font-size: 0.8rem; color: var(--ny-red); font-weight: 800; text-transform: uppercase;">Location</p>
        <p style="margin:5px 0 20px 0; font-weight: 600;">5865 N Glenwood St, Garden City, ID 83714</p>
        
        <p style="margin:0; font-size: 0.8rem; color: var(--ny-red); font-weight: 800; text-transform: uppercase;">Hours</p>
        <p style="margin:5px 0 0 0; font-weight: 600;">Tue - Sun: Open | Monday: Closed</p>
    </div>
</div>

</body>
</html>
