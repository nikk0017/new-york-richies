<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ny-red: #E31837;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        /* PREMIUM ANIMATED BACKGROUND */
        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4) contrast(1.2); /* Makes text pop */
        }

        /* FALLBACK IMAGE if video fails (High Quality Pizza) */
        .bg-fallback {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop') center/cover;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding-bottom: 40px;
        }

        /* FLOATING LOGO */
        .hero {
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        .logo-box {
            width: 150px; height: 150px;
            background: #fff;
            border-radius: 50%;
            border: 5px solid var(--ny-red);
            box-shadow: 0 0 30px rgba(227, 24, 55, 0.6);
            overflow: hidden;
            transform: translateY(40px);
        }

        /* DASHBOARD CONTENT */
        .main-ui {
            padding: 80px 25px 20px;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin: 0; font-weight: 900; letter-spacing: -1px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .tag { font-size: 0.8rem; font-weight: 800; color: var(--ny-red); letter-spacing: 3px; margin-top: 5px; }

        .btn-stack { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }

        .btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .btn:hover { background: var(--ny-red); transform: scale(1.02); border-color: transparent; }

        /* PULSING ORDER BUTTON */
        .order-prime {
            background: var(--ny-red);
            border: none;
            box-shadow: 0 10px 20px rgba(227, 24, 55, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(227, 24, 55, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(227, 24, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(227, 24, 55, 0); }
        }

        /* BIG OFFICIAL SOCIALS */
        .social-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 40px;
        }

        .s-box {
            height: 75px;
            background: var(--glass);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #fff; text-decoration: none;
            transition: 0.3s;
        }

        .s-box:hover { transform: translateY(-5px); color: white; }
        .insta:hover { background: #E1306C; }
        .face:hover { background: #1877F2; }
        .yelp:hover { background: #AF0606; }
        .what:hover { background: #25D366; }

        /* FOOTER CARD */
        .footer-info {
            margin: 40px 20px;
            padding: 25px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            border-left: 5px solid var(--ny-red);
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline poster="cover.webp">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-fresh-pizza-with-mushrooms-and-pepperoni-4940-large.mp4" type="video/mp4">
</video>
<div class="bg-fallback"></div>

<div class="container">
    <div class="hero">
        <div class="logo-box">
            <img src="logo.jpg" style="width:100%; height:100%; object-fit:contain;" onerror="this.src='https://via.placeholder.com/150?text=Richies'">
        </div>
    </div>

    <div class="main-ui">
        <h1>NEW YORK RICHIE'S</h1>
        <div class="tag">EST. GARDEN CITY</div>

        <div class="btn-stack">
            <a href="https://newyorkrichiesboise.com" class="btn order-prime">
                <span><i class="fas fa-utensils"></i> &nbsp; ORDER ONLINE</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="tel:+12083230003" class="btn">
                <span><i class="fas fa-phone-alt"></i> &nbsp; CALL US</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="https://www.google.com/maps/contrib/107924237845650644058/reviews2" class="btn" style="justify-content:center;">GOOGLE</a>
                <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content:center;">APPLE</a>
            </div>
        </div>

        <div class="social-row">
            <a href="https://www.instagram.com/newyorkrichiesboise" class="s-box insta"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1RXGRJzYYV/" class="s-box face"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="s-box yelp"><i class="fab fa-yelp"></i></a>
            <a href="https://wa.me/12083230003" class="s-box what"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <div class="footer-info">
        <strong style="color:var(--ny-red); display:block; margin-bottom:5px;">📍 LOCATION</strong>
        5865 N Glenwood St, Garden City, ID 83714<br><br>
        <strong style="color:var(--ny-red); display:block; margin-bottom:5px;">⏰ HOURS</strong>
        Tue-Sun: Open | Monday: Closed
    </div>
</div>

</body>
</html>
