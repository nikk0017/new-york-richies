<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Richie's</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* 🔥 LIVE GRADIENT BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(270deg, #ff512f, #dd2476, #ff9a00, #ff512f);
    background-size: 800% 800%;
    animation: gradientMove 15s ease infinite;
    z-index: -3;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🔥 FLOATING LIGHT BLOBS */
.blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    z-index: -2;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #ff0000;
    top: 10%;
    left: 10%;
    animation: float 10s infinite alternate;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #ff9900;
    bottom: 10%;
    right: 10%;
    animation: float 12s infinite alternate;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(40px); }
}

/* CARD */
.card {
    width: 90%;
    max-width: 420px;
    margin: 50px auto;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeUp 1s ease;
}

/* LOGO */
.logo {
    width: 100px;
    border-radius: 50%;
    background: white;
    margin-top: -60px;
}

/* TEXT */
h1 {
    margin: 10px 0;
}
.tagline {
    font-size: 13px;
    opacity: 0.9;
}

/* ICON GRID */
.icons {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.icon-btn {
    padding: 16px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.icon-btn img {
    width: 30px;
}

.icon-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
}

/* CALL BUTTON */
.call {
    margin-top: 25px;
}
.call a {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff0000, #ff9a00);
    color: white;
    text-decoration: none;
    font-weight: 600;
}

/* INFO */
.info {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.9;
}

@keyframes fadeUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">

    <img src="logo.jpg" class="logo">

    <h1>New York Richie's</h1>
    <p class="tagline">Pizza • Burgers • Sandwiches</p>

    <div class="icons">

        <a href="tel:+12083230003" class="icon-btn">
            <img src="https://img.icons8.com/color/48/phone.png"/>
        </a>

        <a href="https://www.google.com/maps/search/?api=1&query=5865+N+Glenwood+St+Garden+City+ID+83714" class="icon-btn">
            <img src="https://img.icons8.com/color/48/google-maps.png"/>
        </a>

        <a href="https://www.instagram.com/newyorkrichiesboise" class="icon-btn">
            <img src="https://img.icons8.com/color/48/instagram-new.png"/>
        </a>

        <a href="https://www.facebook.com/share/1RXGRJzYYV" class="icon-btn">
            <img src="https://img.icons8.com/color/48/facebook-new.png"/>
        </a>

        <a href="https://g.page/r/CUYItzqeGzFnEBM/review" class="icon-btn">
            <img src="https://img.icons8.com/color/48/google-logo.png"/>
        </a>

        <a href="https://newyorkrichiesboise.com" class="icon-btn">
            <img src="https://img.icons8.com/color/48/domain.png"/>
        </a>

        <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="icon-btn">
            <img src="https://img.icons8.com/color/48/yelp.png"/>
        </a>

    </div>

    <div class="call">
        <a href="tel:+12083230003">📞 Call Now</a>
    </div>

    <div class="info">
        📍 Garden City, Idaho
    </div>

</div>

</body>
</html>
