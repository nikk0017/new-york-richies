<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Elite Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ny-red: #E31837;
            --ny-dark-red: #8B0000;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            height: 100%;
            overflow-x: hidden;
        }

        /* 1. THE PERMANENT WALLPAPER (Mesh Gradient) */
        /* This creates a premium "Live" look using only code */
        .premium-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-color: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(351,80%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(351,80%,10%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(351,80%,15%,1) 0, transparent 50%);
            background-attachment: fixed;
        }

        /* 2. FLOATING LIGHT (Extraordinary Vibe) */
        .light-glow {
            position: fixed;
            top: 20%; left: 50%;
            width: 80vw; height: 80vw;
            background: var(--ny-red);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: moveLight 10s ease-in-out infinite;
        }

        @keyframes moveLight {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-45%, -45%) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        /* 3. GLOWING LOGO */
        .logo-wrapper {
            width: 150px; height: 150px;
            background: #fff;
            border-radius: 50%;
            border: 4px solid var(--ny-red);
            box-shadow: 0 0 40px rgba(227, 24, 55, 0.6);
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-wrapper img { width: 90%; height: 90%; object-fit: contain; }

        h1 { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        .sub-tag { color: var(--ny-red); font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; margin-top: 5px; }

        /* 4. REFINED BUTTONS */
        .stack { width: 88%; margin: 40px auto; display: flex; flex-direction: column; gap: 12px; }

        .action-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 25px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(15px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn:hover { background: var(--ny-red); transform: translateY(-5px); border-color: transparent; }

        .order-now {
            background: var(--ny-red);
            border: none;
            box-shadow: 0 10px 25px rgba(227, 24, 55, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* 5. BIG SOCIAL ICONS */
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 88%; margin: 20px auto; }
        .s-link { height: 75px; background: rgba(255,255,255,0.05); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .s-link:hover { background: var(--ny-red); transform: translateY(-5px); }

        .info-box { width: 88%; margin: 40px auto; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 25px; text-align: left; border-left: 5px solid var(--ny-red); }
    </style>
</head>
<body>

<div class="premium-bg"></div>
<div class="light-glow"></div>

<div class="container">
    <div class="logo-wrapper">
        <img src="logo.jpg" alt="Richie's Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3132/3132693.png'">
    </div>

    <h1>NEW YORK RICHIE'S</h1>
    <div class="sub-tag">GARDEN CITY, IDAHO</div>

    <div class="stack">
        <a href="https://newyorkrichiesboise.com" class="action-btn order-now">
            <span><i class="fas fa-pizza-slice"></i> &nbsp; ORDER ONLINE NOW</span>
            <i class="fas fa-chevron-right" style="opacity:0.6"></i>
        </a>
        
        <a href="tel:+12083230003" class="action-btn">
            <span><i class="fas fa-phone-alt"></i> &nbsp; CALL</span>
            <i class="fas fa-chevron-right" style="opacity:0.4"></i>
        </a>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="https://www.google.com/maps/contrib/107924237845650644058/reviews6" class="action-btn" style="justify-content:center;">GOOGLE</a>
            <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="action-btn" style="justify-content:center;">APPLE</a>
        </div>
    </div>

    <div class="social-grid">
        <a href="https://www.instagram.com/newyorkrichiesboise" class="s-link"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1RXGRJzYYV/" class="s-link"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.yelp.com/biz/new-york-richies-garden-city" class="s-link"><i class="fab fa-yelp"></i></a>
        <a href="https://wa.me/12083230003" class="s-link"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="info-box">
        <p style="margin:0; font-weight:800; color:var(--ny-red); font-size: 0.7rem; letter-spacing: 2px;">VISIT US</p>
        <p style="margin:5px 0 20px;">5865 N Glenwood St, Garden City, ID 83714</p>
        
        <p style="margin:0; font-weight:800; color:var(--ny-red); font-size: 0.7rem; letter-spacing: 2px;">HOURS</p>
        <p style="margin:5px 0 0;">Tue - Sun: Open (Monday Closed)</p>
    </div>
</div>

</body>
</html>
