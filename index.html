<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New York Richie's | Digital Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ny-red: #A62C2B; --ny-black: #121212; --ny-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ny-black); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--ny-white); min-height: 100vh; padding-bottom: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* LOCAL COVER PHOTO */
        .hero { 
            height: 250px; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('cover.webp'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            position: relative;
        }
        
        /* LOCAL LOGO PHOTO */
        .logo { 
            width: 120px; 
            height: 120px; 
            background: white; 
            border-radius: 50%; 
            border: 4px solid var(--ny-red); 
            position: absolute; 
            bottom: -60px; 
            padding: 5px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .content { margin-top: 80px; text-align: center; padding: 0 25px; }
        h1 { font-size: 1.9rem; margin: 0; color: var(--ny-black); font-weight: 900; letter-spacing: -1px; }
        .tagline { color: #666; font-weight: 600; font-size: 0.9rem; margin: 5px 0 25px 0; text-transform: uppercase; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; background: #f8f9fa; border-radius: 18px; text-decoration: none; color: #121212; font-weight: 700; border: 1px solid #eee; }
        .prime { background: var(--ny-red); color: white; border: none; box-shadow: 0 8px 15px rgba(166,44,43,0.3); }
        
        .socials { margin-top: 30px; display: flex; justify-content: center; gap: 20px; font-size: 1.6rem; }
        .socials a { color: var(--ny-black); }
        
        .footer { margin: 25px 20px; background: #f1f1f1; padding: 20px; border-radius: 20px; text-align: left; font-size: 0.85rem; border-left: 6px solid var(--ny-red); line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="logo">
            <img src="logo.jpg" alt="NY Richie's Logo">
        </div>
    </div>
    <div class="content">
        <h1>NEW YORK RICHIE'S</h1>
        <p class="tagline">Authentic NY Pizza & Subs</p>
        
        <div class="btn-stack">
            <a href="https://newyorkrichiesboise.com" class="btn prime">
                <span><i class="fas fa-shopping-cart"></i> &nbsp; Order Online Now</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="tel:+12083230003" class="btn">
                <span><i class="fas fa-phone-alt"></i> &nbsp; Call: (208) 323-0003</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://g.page/r/CUYItzqeGzFnEBM/review" class="btn">
                <span><i class="fas fa-star"></i> &nbsp; Rate Us on Google</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="https://www.google.com/maps?q=New+York+Richie's+Garden+City" class="btn" style="justify-content: center; font-size: 0.8rem;">Google Maps</a>
                <a href="http://maps.apple.com/?daddr=5865+N+Glenwood+St+Garden+City+ID+83714" class="btn" style="justify-content: center; font-size: 0.8rem;">Apple Maps</a>
            </div>
        </div>
        
        <div class="socials">
            <a href="https://www.instagram.com/newyorkrichiesboise"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1RXGRJzYYV/"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.yelp.com/biz/new-york-richies-garden-city"><i class="fab fa-yelp"></i></a>
        </div>
    </div>
    <div class="footer">
        <strong>📍 Visit Us:</strong><br>
        5865 N Glenwood St, Garden City, ID 83714<br><br>
        <strong>⏰ Hours:</strong><br>
        Tue-Thu: 11AM–9PM | Fri-Sat: 11AM–10PM<br>
        Sun: 12PM–8PM (Mon: Closed)
    </div>
</div>
</body>
</html>
